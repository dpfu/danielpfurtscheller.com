{{ $openAccess := partial "publication-open-access.html" . }}
{{ if $openAccess.readable }}
  <a class="open-access-pill" href="{{ $openAccess.pill_url }}" aria-label="Open Access: {{ .Title }}">
    {{ partial "open-access-icon.html" (dict "Class" "open-access-pill-icon") }}
    <span>Open Access</span>
    {{ partial "external-link-icon.html" (dict "Class" "open-access-pill-external") }}
  </a>
{{ end }}
